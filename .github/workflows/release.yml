name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-cli:
    name: Build and release CLI binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        working-directory: cli
        run: |
          GOOS=darwin  GOARCH=arm64  go build -o ../dist/resilient-darwin-arm64  .
          GOOS=darwin  GOARCH=amd64  go build -o ../dist/resilient-darwin-amd64  .
          GOOS=linux   GOARCH=amd64  go build -o ../dist/resilient-linux-amd64   .
          GOOS=windows GOARCH=amd64  go build -o ../dist/resilient-windows-amd64.exe .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-sdk:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Build and publish
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
        run: |
          cp README.md sdk/README.md
          cd sdk
          poetry build
          poetry publish
